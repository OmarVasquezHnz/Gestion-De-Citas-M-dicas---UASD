[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  RESEND_API_KEY = "REEMPLAZAR_EN_NETLIFY_UI"
  MAIL_FROM = "Gestión de Citas UASD <gestiondecitasuasd@gmail.com>"

[[redirects]]
  from = "/api/notificaciones/cita"
  to = "/.netlify/functions/notificaciones-cita"
  status = 200

[[redirects]]
  from = "/api/storage"
  to = "/.netlify/functions/data-store"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/notificaciones/cita"
  to = "/.netlify/functions/notificaciones-cita"
  status = 200

[[redirects]]
  from = "/api/storage"
  to = "/.netlify/functions/data-store"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
